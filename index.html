<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Chelsea's Kitchen Bannock Bites — website coming soon. Follow @bannock.bites on Instagram for pop-ups, menu updates, and more.">
  <meta name="theme-color" content="#f6e8d4">

  <meta property="og:title" content="Chelsea's Kitchen — Bannock Bites">
  <meta property="og:description" content="Big flavour. Little bites. Follow our journey on Instagram.">
  <meta property="og:image" content="assets/chelseas-kitchen-coming-soon.png">
  <meta property="og:type" content="website">

  <title>Chelsea's Kitchen | Bannock Bites</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="page">
    <section class="splash" aria-labelledby="page-title">
      <h1 id="page-title" class="sr-only">
        Chelsea's Kitchen Bannock Bites — website coming soon
      </h1>

      <div class="artwork">
        <img
          src="assets/chelseas-kitchen-coming-soon.png"
          alt="Chelsea's Kitchen Bannock Bites. Big flavour, little bites. Website coming soon. Follow @bannock.bites on Instagram. Every bite supports our community. Algonquin-owned, Kitigan Zibi Anishinabeg."
          width="1536"
          height="1024"
        >

        <!-- Clickable areas placed over the buttons printed in the artwork. -->
        <a
          class="hotspot instagram-hotspot"
          href="https://www.instagram.com/bannock.bites/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Follow Bannock Bites on Instagram"
        ></a>

        <a
          class="hotspot email-hotspot"
          href="mailto:kris.odjick@gmail.com"
          aria-label="Email Kris at Chelsea's Kitchen"
        ></a>
      </div>

      <div class="mobile-actions" aria-label="Contact links">
        <a
          class="button button-primary"
          href="https://www.instagram.com/bannock.bites/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Follow @bannock.bites
        </a>
        <a class="button button-secondary" href="mailto:kris@chelseaskitchen.ca">
          Email us
        </a>
      </div>
    </section>
  </main>
</body>
</html>
